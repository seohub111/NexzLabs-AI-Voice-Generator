<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NexzBatch</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@600;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 420px;
      min-height: 580px;
      background: #070910;
      color: #e8eaf0;
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    .bg-mesh {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 160% 90% at 5% 0%,  #7c3aed1a 0%, transparent 55%),
        radial-gradient(ellipse 100% 70% at 95% 100%, #0ea5e914 0%, transparent 55%),
        radial-gradient(ellipse 80%  60% at 50% 50%,  #a855f70a 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .container {
      position: relative; z-index: 1;
      padding: 20px 18px 18px;
      display: flex; flex-direction: column; gap: 14px;
    }

    /* ── HEADER ── */
    .header { display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: linear-gradient(135deg, #a651fb, #1fd5f9);
      box-shadow: 0 0 14px #a651fbaa;
    }
    .logo-text {
      font-size: 17px; font-weight: 800;
      background: linear-gradient(90deg, #c084fc, #38bdf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: 0.04em;
    }
    .badge {
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      color: #a651fb; border: 1px solid #a651fb44;
      border-radius: 5px; padding: 2px 7px; letter-spacing: 0.06em;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 9px; font-weight: 600; letter-spacing: 0.14em;
      text-transform: uppercase; color: #4b5563; margin-bottom: 6px;
    }

    /* ── INPUTS ── */
    .prefix-row { display: flex; gap: 8px; }
    .prefix-group { flex: 1; }
    .start-num-group { width: 80px; }

    .input-field {
      width: 100%;
      background: #0d1018; border: 1px solid #1e2535;
      border-radius: 9px; padding: 9px 13px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      color: #e8eaf0; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus {
      border-color: #a651fb55;
      box-shadow: 0 0 0 3px #a651fb18;
    }
    .input-field::placeholder { color: #2d3748; }

    .preview-text {
      margin-top: 5px;
      font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #374151;
    }
    .preview-text span { color: #a651fb; font-weight: 600; }

    /* ── TEXTAREA ── */
    .narration-box {
      background: #0d1018; border: 1px solid #1e2535;
      border-radius: 10px; padding: 11px 13px;
      font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
      color: #e8eaf0; line-height: 1.65; width: 100%;
      height: 160px; resize: none; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .narration-box:focus {
      border-color: #a651fb55;
      box-shadow: 0 0 0 3px #a651fb18;
    }
    .narration-box::placeholder { color: #1f2937; }

    /* ── META ROW ── */
    .meta-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: -8px;
    }
    .line-count {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #4b5563;
    }
    .line-count span { color: #a651fb; font-weight: 600; }

    /* ── DELAY ── */
    .delay-row { display: flex; align-items: center; gap: 10px; }
    .delay-row label {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: #64748b; white-space: nowrap;
    }
    .delay-row input[type=range] { flex: 1; accent-color: #a651fb; height: 3px; }
    .delay-val {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: #a651fb; min-width: 28px; text-align: right;
    }

    /* ── BIG PROGRESS SECTION ── */
    .progress-section {
      background: #0d1018; border: 1px solid #1e2535;
      border-radius: 12px; padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }

    .progress-header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .progress-title {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: #64748b;
    }
    .progress-pct {
      font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 600;
      background: linear-gradient(90deg, #c084fc, #38bdf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .progress-fraction {
      font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #4b5563;
      text-align: right; margin-top: 1px;
    }

    /* The actual bar */
    .bar-track {
      background: #141820; border-radius: 100px;
      height: 10px; overflow: hidden; position: relative;
    }
    .bar-fill {
      height: 100%; border-radius: 100px; width: 0%;
      background: linear-gradient(90deg, #7c3aed, #06b6d4);
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 0 12px #7c3aed88;
      position: relative;
    }
    .bar-fill::after {
      content: '';
      position: absolute; right: 0; top: 0; bottom: 0; width: 20px;
      background: linear-gradient(90deg, transparent, #ffffff22);
      border-radius: 100px;
      animation: shine 1.5s ease-in-out infinite;
    }
    @keyframes shine {
      0%,100% { opacity: 0; }
      50% { opacity: 1; }
    }

    /* Mini step indicators */
    .step-dots {
      display: flex; gap: 4px; flex-wrap: wrap;
    }
    .step-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #1e2535; transition: all 0.3s;
    }
    .step-dot.done  { background: #7c3aed; box-shadow: 0 0 6px #7c3aed88; }
    .step-dot.active { background: #06b6d4; box-shadow: 0 0 6px #06b6d488;
      animation: pulse-dot 1s ease-in-out infinite; }
    @keyframes pulse-dot {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    /* ── STATUS ── */
    .status-box {
      background: #090c12; border: 1px solid #151c28;
      border-radius: 9px; padding: 9px 13px;
      font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
      color: #4b5563; min-height: 34px; line-height: 1.55;
    }
    .status-box .ok  { color: #34d399; }
    .status-box .err { color: #f87171; }
    .status-box .inf { color: #60a5fa; }
    .status-box .wrn { color: #fbbf24; }

    /* ── BUTTONS ── */
    .btn-row { display: flex; gap: 9px; }
    .btn {
      flex: 1; padding: 12px;
      border: none; border-radius: 10px;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.04em; transition: all 0.2s;
    }
    .btn-start {
      background: linear-gradient(135deg, #7c3aed, #0ea5e9);
      color: #fff; box-shadow: 0 4px 24px #7c3aed44;
    }
    .btn-start:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px #7c3aed66; }
    .btn-start:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-stop {
      background: #120a0a; color: #f87171;
      border: 1px solid #7f1d1d44; flex: 0.42;
    }
    .btn-stop:hover:not(:disabled) { background: #1e0f0f; }
    .btn-stop:disabled { opacity: 0.25; cursor: not-allowed; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e2535; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <div class="logo-dot"></div>
        <div class="logo-text">NexzBatch</div>
      </div>
      <div class="badge">v2.0</div>
    </div>

    <!-- File Settings -->
    <div>
      <div class="section-label">File Settings</div>
      <div class="prefix-row">
        <div class="prefix-group">
          <input class="input-field" id="prefix" type="text" placeholder="Voice" value="Voice" />
        </div>
        <div class="start-num-group">
          <input class="input-field" id="startNum" type="number" placeholder="1" value="1" min="1" />
        </div>
      </div>
      <div class="preview-text">→ Files: <span id="previewName">Voice_1.mp3</span>, <span id="previewName2">Voice_2.mp3</span> ...</div>
    </div>

    <!-- Narrations -->
    <div>
      <div class="section-label">Narrations — one per line</div>
      <textarea
        class="narration-box"
        id="narrations"
        placeholder="Marcus had been staring at his electricity bill...&#10;The bill was actually lower than last year...&#10;Marcus felt vaguely proud. He shouldn't have..."
      ></textarea>
    </div>

    <!-- Meta row -->
    <div class="meta-row">
      <div class="line-count">Lines detected: <span id="lineCount">0</span></div>
      <div class="line-count" id="etaInfo"></div>
    </div>

    <!-- Delay -->
    <div>
      <div class="section-label">Wait Time Per Voice</div>
      <div class="delay-row">
        <label>Delay:</label>
        <input type="range" id="delay" min="3" max="25" value="8" step="1" />
        <div class="delay-val"><span id="delayVal">8</span>s</div>
      </div>
    </div>

    <!-- PROGRESS SECTION -->
    <div class="progress-section">
      <div class="progress-header">
        <div>
          <div class="progress-title">Batch Progress</div>
          <div class="progress-fraction" id="progressFraction">0 / 0 completed</div>
        </div>
        <div class="progress-pct" id="progressPct">0%</div>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="barFill"></div>
      </div>
      <div class="step-dots" id="stepDots"></div>
    </div>

    <!-- Status -->
    <div class="status-box" id="statusBox">
      <span class="inf">Ready — paste narrations and click Start.</span>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn btn-start" id="btnStart">▶ Start Batch</button>
      <button class="btn btn-stop" id="btnStop" disabled>■ Stop</button>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
